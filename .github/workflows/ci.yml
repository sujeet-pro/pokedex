name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint (oxlint)
        run: npm run lint
      - name: Format (oxfmt --check)
        run: npm run format:check
      - name: Typecheck (tsgo)
        run: npm run typecheck
      - name: Build
        run: npx vite build
      - name: Test
        run: npm test -- --run
        if: hashFiles('src/**/*.test.ts', 'src/**/*.test.tsx') != ''
