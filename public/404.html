<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pokédex</title>
    <script>
      // SPA fallback for GitHub Pages: redirect deep paths back to the SPA entry
      // with the original path encoded so the client router can read it.
      (function () {
        var repo = "/pokedex";
        var loc = window.location;
        var pathname = loc.pathname;
        var rest = pathname.indexOf(repo) === 0 ? pathname.slice(repo.length) : pathname;
        var target =
          loc.protocol +
          "//" +
          loc.host +
          repo +
          "/?__redirect=" +
          encodeURIComponent(rest + loc.search) +
          loc.hash;
        loc.replace(target);
      })();
    </script>
  </head>
  <body>Redirecting…</body>
</html>
